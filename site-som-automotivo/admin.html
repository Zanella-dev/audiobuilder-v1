<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioBuilder - Painel Administrativo</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; margin: 0; padding: 0; color: #e0e0e0; }
        header { background-color: #1f1f1f; color: #fff; padding: 25px; text-align: center; border-bottom: 2px solid #333; }
        header h1 { margin: 0; color: #3498db; letter-spacing: 1px; }
        
        .container { display: flex; max-width: 1000px; margin: 40px auto; gap: 30px; padding: 0 20px; }
        
        /* Caixas de Formulário */
        .form-box { background: #1f1f1f; padding: 30px; border-radius: 10px; flex: 1; border-top: 5px solid #3498db; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        .form-box.falante-box { border-top-color: #e67e22; }
        
        .form-box h2 { margin-top: 0; color: #fff; text-align: center; margin-bottom: 20px; }
        
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #444; border-radius: 5px; background: #2c2c2c; color: #fff; box-sizing: border-box; font-size: 14px; }
        input::placeholder { color: #888; }
        input:focus { outline: none; border-color: #3498db; }
        
        button { background-color: #3498db; color: white; border: none; width: 100%; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 15px; transition: 0.3s; }
        button:hover { background-color: #2980b9; }
        
        .btn-laranja { background-color: #e67e22; }
        .btn-laranja:hover { background-color: #d35400; }
        
        .link-voltar { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; }
        .link-voltar:hover { color: #fff; }
    </style>
</head>
<body>

    <header>
        <h1>⚙️ Painel de Controle - Estoque</h1>
        <p>Cadastre novos equipamentos sem encostar no código do banco de dados.</p>
    </header>

    <div class="container">
        <div class="form-box">
            <h2>Cadastrar Módulo</h2>
            <form id="formModulo">
                <input type="text" name="marca" placeholder="Marca (ex: Taramps)" required>
                <input type="text" name="modelo" placeholder="Modelo (ex: MD 1200.1)" required>
                <input type="number" name="potencia_rms" placeholder="Potência RMS (ex: 1200)" required>
                <input type="number" step="0.1" name="impedancia_minima" placeholder="Impedância Mínima (Ohms)" required>
                <input type="number" name="consumo_max_amperes" placeholder="Consumo Máximo (Amperes)" required>
                
                <button type="submit">💾 Salvar Módulo</button>
            </form>
        </div>

        <div class="form-box falante-box">
            <h2>Cadastrar Alto-Falante</h2>
            <form id="formFalante">
                <input type="text" name="marca" placeholder="Marca (ex: Eros)" required>
                <input type="text" name="modelo" placeholder="Modelo (ex: Panzer)" required>
                <input type="number" name="potencia_rms" placeholder="Potência RMS" required>
                <input type="number" step="0.1" name="impedancia_nominal" placeholder="Impedância Nominal (Ohms)" required>
                
                <button type="submit" class="btn-laranja">💾 Salvar Falante</button>
            </form>
        </div>
    </div>
    
    <a href="index.html" class="link-voltar">← Voltar para a Loja</a>

    <script>
        // Esta função pega o que você digitou e manda pro Java
        function enviarParaOJava(event, idDoFormulario, urlDoJava) {
            event.preventDefault(); // Evita que a página pisque/recarregue

            let formulario = document.getElementById(idDoFormulario);
            let dadosDigitados = new FormData(formulario);

            fetch(urlDoJava, {
                method: 'POST',
                body: dadosDigitados
            })
            .then(resposta => resposta.text())
            .then(texto => {
                alert(texto); // Mostra se deu certo ou errado
                formulario.reset(); // Limpa os campos para você cadastrar o próximo!
            })
            .catch(erro => alert("Erro! O servidor Java está ligado?"));
        }

        // Avisa o navegador o que fazer quando você clica em "Salvar"
        document.getElementById('formModulo').onsubmit = function(event) {
            enviarParaOJava(event, 'formModulo', 'http://localhost:7070/cadastrar-modulo');
        };

        document.getElementById('formFalante').onsubmit = function(event) {
            enviarParaOJava(event, 'formFalante', 'http://localhost:7070/cadastrar-falante');
        };
    </script>
</body>
</html>
